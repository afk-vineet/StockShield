<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Market | Stock Shield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #05070a; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-black mb-10 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">GLOBAL MARKET TERMINAL</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            {% for index in indices %}
            <div class="glass p-8 rounded-[2rem] hover:border-blue-500/50 transition">
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold">{{ index.name }}</h2>
                        <p class="text-gray-500 font-mono text-sm">{{ index.symbol }}</p>
                    </div>
                    <a href="/predict/{{ index.symbol }}" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">RUN AI SHIELD</a>
                </div>
                <div class="mt-6 h-1 w-full bg-gray-800 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-500 animate-pulse" style="width: 70%"></div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
